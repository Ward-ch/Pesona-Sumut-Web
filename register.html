<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Pesona Sumut</title>
  <link rel="icon" href="./image/icon.jpg">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="chatbot.css">
</head>
<body class="auth-page">

  <header>
    <nav class="navbar">
      <div class="container">
        <a href="Project.html" class="logo">Pesona Sumut</a>
        <ul class="menu">
          <li><a href="Project.html">Home</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a href="register.html">Register</a></li>
          <li><a href="#">Contact</a></li>
          <li><a href="#">About Us</a></li>
          <li><a href="mailto:edward@gmail.com">My E-mail</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <div class="content">
    <div class="box">
      <h2>Buat Akun</h2>
      <p>Daftar sekarang dan mulai rencanakan liburan impian Anda</p>
      <div class="form-row">
        <label>Nama Lengkap</label>
        <input type="text" placeholder="Masukkan nama lengkap">
      </div>
      <div class="form-row">
        <label>Email</label>
        <input type="email" placeholder="contoh@email.com">
      </div>
      <div class="form-row">
        <label>Password</label>
        <input type="password" placeholder="Buat password">
      </div>
      <div class="form-row">
        <label>Konfirmasi Password</label>
        <input type="password" placeholder="Ulangi password">
      </div>
      <button class="btn" onclick="alert('Registrasi berhasil! (Simulasi)')">Daftar</button>
      <div class="bottom-text">
        Sudah punya akun? <a href="login.html">Login Sekarang</a>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 PT Wisata Sumut. All rights reserved.</p>
  </footer>
  <script src="./chatbot.js"></script>
  <script src="./main.js"></script>

</body>
</html>
